version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      uv-dependencies:
        patterns:
          - '*'
  - package-ecosystem: "npm"
    directory: "/public"
    schedule:
      interval: "monthly"
    groups:
      npm-dependencies:
        patterns:
          - '*'
    ignore:
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
